[pytest]
# Pytest configuration for ShelfIQ backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# Coverage options (when using pytest-cov)
# addopts = --cov=functions --cov-report=html --cov-report=term

# Environment variables for testing
env =
    LOG_LEVEL=DEBUG
    MOCK_BEDROCK=true
    PRODUCTS_TABLE=test-products
    RECOMMENDATIONS_TABLE=test-recommendations
    CACHE_TABLE=test-cache
